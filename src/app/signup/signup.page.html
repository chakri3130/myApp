<ion-content [fullscreen]="true" class="ion-padding">
  <div class="signup-container">
    <ion-card class="signup-card">
      <ion-card-header>
        <div class="logo-container">
          <ion-icon name="person-add-outline" color="primary"></ion-icon>
        </div>
        <ion-card-title>Create Account</ion-card-title>
        <p class="title-desc">Sign up to get started</p>
      </ion-card-header>

      <ion-card-content>
        <form [formGroup]="signupForm" (ngSubmit)="onSignup()">
          
          <ion-row>
            <ion-col size="6" class="ion-no-padding" style="padding-right: 4px;">
              <ion-input 
                class="custom-input"
                fill="outline" 
                label="First Name" 
                labelPlacement="floating" 
                placeholder="First"
                formControlName="firstName">
              </ion-input>
              <div class="error-msg" *ngIf="(isSubmitted || f['firstName'].touched) && f['firstName'].errors">
                <span *ngIf="f['firstName'].errors['required']">Required</span>
                <span *ngIf="f['firstName'].errors['minlength']">Min 3 chars</span>
              </div>
            </ion-col>
            <ion-col size="6" class="ion-no-padding" style="padding-left: 4px;">
              <ion-input 
                class="custom-input"
                fill="outline" 
                label="Last Name" 
                labelPlacement="floating" 
                placeholder="Last"
                formControlName="lastName">
              </ion-input>
              <div class="error-msg" *ngIf="(isSubmitted || f['lastName'].touched) && f['lastName'].errors">
                <span *ngIf="f['lastName'].errors['required']">Required</span>
                <span *ngIf="f['lastName'].errors['minlength']">Min 3 chars</span>
              </div>
            </ion-col>
          </ion-row>

          <div class="input-wrapper">
            <ion-input 
              class="custom-input"
              type="email"
              fill="outline" 
              label="Email Address" 
              labelPlacement="floating" 
              placeholder="Enter your email"
              formControlName="email">
              <ion-icon slot="start" name="mail-outline" aria-hidden="true"></ion-icon>
            </ion-input>
            <div class="error-msg" *ngIf="(isSubmitted || f['email'].touched) && f['email'].errors">
              <span *ngIf="f['email'].errors['required']">Required</span>
              <span *ngIf="f['email'].errors['email']">Invalid email format</span>
            </div>
          </div>

          <div class="input-wrapper">
            <ion-input 
              class="custom-input"
              type="tel"
              fill="outline" 
              label="Mobile Number" 
              labelPlacement="floating" 
              placeholder="Enter your mobile"
              formControlName="mobileNumber">
              <ion-icon slot="start" name="call-outline" aria-hidden="true"></ion-icon>
            </ion-input>
            <div class="error-msg" *ngIf="(isSubmitted || f['mobileNumber'].touched) && f['mobileNumber'].errors">
              <span *ngIf="f['mobileNumber'].errors['required']">Required</span>
              <span *ngIf="f['mobileNumber'].errors['minlength'] || f['mobileNumber'].errors['maxlength']">Must be exactly 10 digits</span>
              <span *ngIf="f['mobileNumber'].errors['pattern']">Numbers only</span>
            </div>
          </div>

          <div class="input-wrapper">
            <ion-input 
              class="custom-input"
              type="password"
              fill="outline" 
              label="Password" 
              labelPlacement="floating" 
              placeholder="Create a password"
              formControlName="password">
              <ion-icon slot="start" name="lock-closed-outline" aria-hidden="true"></ion-icon>
              <ion-input-password-toggle slot="end"></ion-input-password-toggle>
            </ion-input>
            <div class="error-msg" *ngIf="(isSubmitted || f['password'].touched) && f['password'].errors">
              <span *ngIf="f['password'].errors['required']">Required</span>
              <span *ngIf="f['password'].errors['minlength']">Min 6 chars</span>
            </div>
          </div>

          <div class="input-wrapper">
            <ion-input 
              class="custom-input"
              type="password"
              fill="outline" 
              label="Confirm Password" 
              labelPlacement="floating" 
              placeholder="Confirm your password"
              formControlName="confirmPassword">
              <ion-icon slot="start" name="lock-closed-outline" aria-hidden="true"></ion-icon>
              <ion-input-password-toggle slot="end"></ion-input-password-toggle>
            </ion-input>
            <div class="error-msg" *ngIf="(isSubmitted || f['confirmPassword'].touched) && f['confirmPassword'].errors">
              <span *ngIf="f['confirmPassword'].errors['required']">Required</span>
            </div>
            <div class="error-msg" *ngIf="(isSubmitted || f['confirmPassword'].touched) && signupForm.hasError('passwordMismatch')">
              <span>Passwords do not match</span>
            </div>
          </div>

          <ion-button type="submit" expand="block" class="signup-btn" shape="round">
            Sign Up
          </ion-button>

          <ion-grid class="ion-no-padding action-grid">
            <ion-row class="action-row ion-justify-content-between">
              <ion-col size="auto">
                <ion-button fill="clear" size="small" (click)="navigateToLogin()">
                  Already a member? Login
                </ion-button>
              </ion-col>
              <ion-col size="auto">
                <ion-button fill="clear" size="small">
                  Forgot password?
                </ion-button>
              </ion-col>
            </ion-row>
          </ion-grid>
          
        </form>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
